name: Rozpakuj ZIP automatycznie

on:
  push:
    paths:
      - '*.zip'

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Rozpakuj ZIP
        run: |
          unzip *.zip -d extracted/
      - name: Zatwierdź zmiany
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add extracted/
          git commit -m "Automatycznie rozpakowano ZIP"
          git push
